<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex">

    <!-- LEFT SIDE (40%) -->
    <div class="hidden md:flex w-2/5 bg-gradient-to-br from-purple-600 to-indigo-700 items-center justify-center text-white">

        <div class="max-w-md text-center px-10 space-y-6">

            <h1 class="text-4xl font-bold leading-tight">
                Create Your Account
            </h1>

            <p class="text-lg text-purple-100">
                Start managing your finances and track your expenses effortlessly.
            </p>

            <div class="space-y-3 text-sm text-purple-200 text-left">
                <p>✔ Secure and private account</p>
                <p>✔ Track expenses anytime</p>
                <p>✔ Analyze your spending</p>
                <p>✔ Simple and user-friendly</p>
            </div>

        </div>

    </div>

    <!-- RIGHT SIDE (60%) -->
    <div class="w-full md:w-3/5 flex items-center justify-center bg-gray-100">

        <div class="bg-white p-8 rounded-xl shadow-lg w-80">

            <h2 class="text-2xl font-semibold mb-6 text-gray-700 text-center">Register</h2>

            <form method="POST" class="space-y-4">

                <div>
                    <label class="text-gray-600 text-sm">Username</label>
                    <input type="text" name="username"
                        class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400">
                </div>

                <div>
                    <label class="text-gray-600 text-sm">Password</label>
                    <input type="password" name="password"
                        class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400">
                </div>

                <button type="submit"
                    class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition">
                    Register
                </button>

            </form>

            <p class="text-center text-sm text-gray-500 mt-4">
                Already have an account?
                <a href="/" class="text-purple-600 font-medium hover:underline">Login</a>
            </p>

        </div>

    </div>

</body>
</html>
