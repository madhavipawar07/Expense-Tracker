<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex">

    <!-- LEFT SIDE (40%) -->
    <div class="hidden md:flex w-2/5 bg-gradient-to-br from-indigo-600 to-purple-700 items-center justify-center text-white">

        <div class="max-w-md text-center px-10 space-y-6">

            <h1 class="text-4xl font-bold leading-tight">
                Expense Tracker
            </h1>

            <p class="text-lg text-indigo-100">
                Take control of your finances with a smart way to track your daily expenses.
            </p>

            <div class="space-y-3 text-sm text-indigo-200 text-left">
                <p>✔ Track daily spending easily</p>
                <p>✔ Categorize expenses smartly</p>
                <p>✔ View totals instantly</p>
                <p>✔ Secure personal account</p>
            </div>

        </div>

    </div>

    <!-- RIGHT SIDE (60%) -->
    <div class="w-full md:w-3/5 flex items-center justify-center bg-gray-100">

        <div class="bg-white p-8 rounded-xl shadow-lg w-80">

            <h2 class="text-2xl font-semibold mb-4 text-gray-700 text-center">
                Login
            </h2>

            <!-- ✅ ERROR MESSAGE -->
            {% if error %}
            <div class="bg-red-100 text-red-600 p-2 rounded-lg text-sm text-center mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">

                <div>
                    <label class="text-gray-600 text-sm">Username</label>
                    <input type="text" name="username"
                        class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>

                <div>
                    <label class="text-gray-600 text-sm">Password</label>
                    <input type="password" name="password"
                        class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
                    Login
                </button>

            </form>

            <p class="text-center text-sm text-gray-500 mt-4">
                Don't have an account?
                <a href="/register" class="text-indigo-600 font-medium hover:underline">
                    Register
                </a>
            </p>

        </div>

    </div>

</body>
</html>
